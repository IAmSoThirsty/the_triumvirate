<svg width="1200" height="630" viewBox="0 0 1200 630" xmlns="http://www.w3.org/2000/svg">
  <!-- Background Gradient -->
  <defs>
    <linearGradient id="bgGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0F172A;stop-opacity:1" />
      <stop offset="50%" style="stop-color:#1E293B;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#1E3A8A;stop-opacity:1" />
    </linearGradient>
    
    <linearGradient id="textGradient" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#60A5FA;stop-opacity:1" />
      <stop offset="50%" style="stop-color:#06B6D4;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#22D3EE;stop-opacity:1" />
    </linearGradient>
    
    <filter id="glow">
      <feGaussianBlur stdDeviation="4" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>
  
  <!-- Background -->
  <rect width="1200" height="630" fill="url(#bgGradient)"/>
  
  <!-- Decorative Elements -->
  <circle cx="100" cy="100" r="200" fill="#1E3A8A" opacity="0.3"/>
  <circle cx="1100" cy="530" r="150" fill="#0891B2" opacity="0.2"/>
  
  <!-- Main Content -->
  <g transform="translate(100, 200)">
    <!-- Trinity Symbol -->
    <text x="0" y="0" font-family="Arial, sans-serif" font-size="120" fill="url(#textGradient)" filter="url(#glow)">🔱</text>
    
    <!-- Main Title -->
    <text x="150" y="0" font-family="Arial, sans-serif" font-size="64" font-weight="bold" fill="#F8FAFC">
      <tspan x="150" dy="0">The Triumvirate</tspan>
    </text>
    
    <!-- Subtitle -->
    <text x="150" y="80" font-family="Arial, sans-serif" font-size="36" fill="#93C5FD">
      <tspan x="150" dy="0">AI × Humanity × Technology</tspan>
    </text>
    
    <!-- Description -->
    <text x="150" y="140" font-family="Arial, sans-serif" font-size="24" fill="#CBD5E1" opacity="0.9">
      <tspan x="150" dy="0">Exploring the Trinity of ethical AI development,</tspan>
      <tspan x="150" dy="35">robust security, and transparent knowledge systems</tspan>
    </text>
  </g>
  
  <!-- Footer -->
  <g transform="translate(100, 560)">
    <text font-family="Arial, sans-serif" font-size="20" fill="#94A3B8">
      <tspan>ThirstysProjects.com</tspan>
    </text>
  </g>
</svg>
