<svg width="1200" height="600" viewBox="0 0 1200 600" xmlns="http://www.w3.org/2000/svg">
  <!-- Background Gradient -->
  <defs>
    <linearGradient id="bgGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0F172A;stop-opacity:1" />
      <stop offset="50%" style="stop-color:#1E293B;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#1E3A8A;stop-opacity:1" />
    </linearGradient>
    
    <linearGradient id="textGradient" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#60A5FA;stop-opacity:1" />
      <stop offset="50%" style="stop-color:#06B6D4;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#22D3EE;stop-opacity:1" />
    </linearGradient>
  </defs>
  
  <!-- Background -->
  <rect width="1200" height="600" fill="url(#bgGradient)"/>
  
  <!-- Main Content Centered -->
  <g transform="translate(600, 300)">
    <!-- Trinity Symbol -->
    <text x="0" y="-80" font-family="Arial, sans-serif" font-size="100" fill="url(#textGradient)" text-anchor="middle">🔱</text>
    
    <!-- Title -->
    <text x="0" y="20" font-family="Arial, sans-serif" font-size="56" font-weight="bold" fill="#F8FAFC" text-anchor="middle">
      The Triumvirate
    </text>
    
    <!-- Tagline -->
    <text x="0" y="80" font-family="Arial, sans-serif" font-size="32" fill="#93C5FD" text-anchor="middle">
      AI × Humanity × Technology
    </text>
    
    <!-- Footer -->
    <text x="0" y="180" font-family="Arial, sans-serif" font-size="20" fill="#94A3B8" text-anchor="middle">
      ThirstysProjects.com
    </text>
  </g>
</svg>
